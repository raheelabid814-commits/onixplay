<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <link rel="manifest" href="manifest.json">
    <title>Details - OnixPlay+</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #050505; color: #fff; margin: 0; font-family: 'Inter', sans-serif; }

        /* HERO */
        .movie-detail-hero {
            position: relative;
            min-height: 70vh;
            background-size: cover;
            background-position: center 20%;
            display: flex;
            align-items: flex-end;
            padding: 40px 4%;
        }
        .movie-detail-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(5,5,5,0.95) 30%, rgba(5,5,5,0.3) 100%),
                        linear-gradient(0deg, #050505 0%, transparent 60%);
        }
        .detail-content {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 40px;
            max-width: 1200px;
            width: 100%;
        }
        .detail-poster {
            width: 220px;
            min-width: 220px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.08);
            object-fit: cover;
            aspect-ratio: 2/3;
            background: #181818;
        }
        .detail-info { flex: 1; padding-top: 20px; }
        .detail-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .badge {
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .badge-type { background: var(--primary-accent, #39ff14); color: #000; }
        .badge-rating { background: #333; color: #fff; }
        .badge-year { background: rgba(255,255,255,0.1); color: #ccc; }
        .detail-title { font-size: 3rem; font-weight: 800; margin: 0 0 8px; line-height: 1.1; }
        .detail-tagline { font-size: 1rem; color: #aaa; font-style: italic; margin-bottom: 20px; }
        .detail-desc { font-size: 1rem; line-height: 1.7; color: #ccc; max-width: 700px; margin-bottom: 30px; }
        .detail-meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            color: var(--text-muted, #888);
        }
        .detail-meta-row span strong { color: #fff; }
        .hero-buttons { display: flex; gap: 12px; flex-wrap: wrap; }

        @media (max-width: 768px) {
            .movie-detail-hero { padding-top: 90px; min-height: auto; }
            .detail-content { flex-direction: column; align-items: center; text-align: center; }
            .detail-poster { width: 160px; min-width: 160px; }
            .detail-title { font-size: 2rem; }
            .hero-buttons { justify-content: center; }
            .detail-badges { justify-content: center; }
            .detail-meta-row { justify-content: center; }
        }

        /* SEASONS & EPISODES */
        .seasons-section {
            padding: 50px 4% 80px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .seasons-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
        }
        .seasons-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0;
        }
        .season-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .season-tab {
            padding: 8px 18px;
            border-radius: 20px;
            background: #222;
            border: 1px solid #333;
            color: #aaa;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .season-tab:hover { background: #333; color: #fff; }
        .season-tab.active {
            background: var(--primary-accent, #39ff14);
            color: #000;
            border-color: var(--primary-accent, #39ff14);
        }

        .episodes-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .episode-item {
            display: grid;
            grid-template-columns: 40px 200px 1fr auto;
            align-items: center;
            gap: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .episode-item:hover { background: #1a1a1a; }
        .episode-number {
            font-size: 1.3rem;
            font-weight: 700;
            color: #555;
            text-align: center;
        }
        .episode-thumb-wrap {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            aspect-ratio: 16/9;
            background: #111;
        }
        .episode-thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .episode-thumb-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.2s;
        }
        .episode-item:hover .episode-thumb-overlay { opacity: 1; }
        .ep-play-icon { font-size: 1.5rem; color: #fff; }
        .episode-text { flex: 1; }
        .episode-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 5px; color: #fff; }
        .episode-overview {
            font-size: 0.82rem;
            color: #888;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .episode-runtime {
            font-size: 0.8rem;
            color: #666;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .episode-item {
                grid-template-columns: 30px 120px 1fr;
            }
            .episode-runtime { display: none; }
        }
        @media (max-width: 500px) {
            .episode-item {
                grid-template-columns: 26px 1fr;
            }
            .episode-thumb-wrap { display: none; }
        }

        /* GENRES CHIPS */
        .genre-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; }
        .genre-chip {
            padding: 5px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 0.82rem;
            color: #bbb;
        }
    </style>
</head>
<body>
    <nav class="navbar scrolled" style="padding: 15px 4%; justify-content: flex-start;">
        <a href="index.html" style="color: #fff; text-decoration: none; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;">
            <i class="fa fa-arrow-left"></i> Back
        </a>
    </nav>

    <div class="movie-detail-hero" id="movie-hero">
        <div class="detail-content">
            <img src="" alt="Poster" class="detail-poster" id="movie-poster">
            <div class="detail-info">
                <div class="detail-badges" id="detail-badges">
                    <span class="badge badge-type" id="badge-type">MOVIE</span>
                    <span class="badge badge-rating" id="badge-rating">⭐ —</span>
                    <span class="badge badge-year" id="badge-year">—</span>
                </div>
                <h1 class="detail-title" id="movie-title">Loading...</h1>
                <p class="detail-tagline" id="movie-tagline"></p>
                <div class="genre-chips" id="genre-chips"></div>
                <div class="detail-meta-row" id="movie-meta-row">
                    <span id="meta-runtime"></span>
                    <span id="meta-status"></span>
                    <span id="meta-lang"></span>
                </div>
                <p class="detail-desc" id="movie-desc">Fetching details...</p>
                <div class="hero-buttons">
                    <button class="btn btn-play tv-focusable" id="play-btn"><i class="fa fa-play"></i> Watch Now</button>
                    <button class="btn btn-info tv-focusable" id="add-list-btn"><i class="fa fa-plus"></i> My List</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Seasons & Episodes Section (Only for TV) -->
    <div class="seasons-section" id="tv-show-content" style="display: none;">
        <div class="seasons-header">
            <h2>Episodes</h2>
            <div class="season-tabs" id="season-tabs"></div>
        </div>
        <div class="episodes-list" id="episodes-container">
            <p style="color:#666">Select a season to view episodes.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/ui.js"></script>
    <script src="js/tv-nav.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const SUPABASE_URL = 'https://qlvpdukltvmenbfqkaxu.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_qKZ9yLXawfesBidq_CHN3w_DRKGe6xN';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const params = new URLSearchParams(window.location.search);
            const movieId = params.get('id');
            const type = params.get('type') || 'movie';
            const TMDB_API_KEY = 'd0c153faeb709eb8deffeece3081d375';

            const userSession = JSON.parse(localStorage.getItem('pirate_session'));


            const posterEl = document.getElementById('movie-poster');
            const titleEl = document.getElementById('movie-title');
            const descEl = document.getElementById('movie-desc');
            const heroEl = document.getElementById('movie-hero');
            const taglineEl = document.getElementById('movie-tagline');
            const runtimeEl = document.getElementById('meta-runtime');
            const statusEl = document.getElementById('meta-status');
            const langEl = document.getElementById('meta-lang');
            const genreEl = document.getElementById('genre-chips');
            const badgeType = document.getElementById('badge-type');
            const badgeRating = document.getElementById('badge-rating');
            const badgeYear = document.getElementById('badge-year');

            if (!movieId) {
                titleEl.innerText = "Movie Not Found";
                return;
            }

            async function fetchDetails() {
                try {
                    const res = await fetch(`https://api.themoviedb.org/3/${type}/${movieId}?api_key=${TMDB_API_KEY}&append_to_response=content_ratings`);
                    const data = await res.json();

                    if (!data.id) throw new Error("Invalid data");

                    const title = data.title || data.name;
                    const year = (data.release_date || data.first_air_date || '').substring(0, 4);
                    const rating = data.vote_average ? data.vote_average.toFixed(1) : 'N/A';
                    const poster = data.poster_path
                        ? `https://image.tmdb.org/t/p/w500${data.poster_path}`
                        : `https://image.tmdb.org/t/p/w500${data.backdrop_path || ''}`;

                    document.title = `${title} - OnixPlay+`;
                    titleEl.innerText = title;
                    descEl.innerText = data.overview || 'No description available.';

                    if (data.tagline) taglineEl.innerText = `"${data.tagline}"`;

                    badgeType.innerText = type === 'tv' ? 'SERIES' : 'FILM';
                    badgeRating.innerText = `⭐ ${rating}`;
                    badgeYear.innerText = year;

                    // Poster: use poster_path, fallback to backdrop, fallback to placeholder svg
                    if (poster && poster.includes('image.tmdb.org')) {
                        posterEl.src = poster;
                    } else {
                        posterEl.src = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='330'><rect width='220' height='330' fill='%23181818'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%23555' font-size='14'>No Poster</text></svg>`;
                    }
                    posterEl.onerror = function() {
                        this.src = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='330'><rect width='220' height='330' fill='%23181818'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%23555' font-size='14'>No Poster</text></svg>`;
                    };

                    if (data.backdrop_path) {
                        heroEl.style.backgroundImage = `url('https://image.tmdb.org/t/p/original${data.backdrop_path}')`;
                    }

                    // Meta info
                    if (type === 'movie' && data.runtime) {
                        runtimeEl.innerHTML = `<strong>${Math.floor(data.runtime/60)}h ${data.runtime%60}m</strong>`;
                    } else if (data.episode_run_time && data.episode_run_time.length > 0) {
                        runtimeEl.innerHTML = `<strong>${data.episode_run_time[0]}m</strong> per episode`;
                    }
                    if (data.status) statusEl.innerHTML = `<strong>${data.status}</strong>`;
                    if (data.original_language) {
                        const langMap = { en: 'English', hi: 'Hindi', ja: 'Japanese', ko: 'Korean', fr: 'French', es: 'Spanish' };
                        langEl.innerHTML = `<strong>${langMap[data.original_language] || data.original_language.toUpperCase()}</strong>`;
                    }

                    // Genres
                    genreEl.innerHTML = (data.genres || []).map(g => `<span class="genre-chip">${g.name}</span>`).join('');

                    if (type === 'tv' && data.seasons) {
                        document.getElementById('tv-show-content').style.display = 'block';
                        setupTV(data);
                    }
                } catch (e) {
                    console.error("Detail Error:", e);
                    titleEl.innerText = "Failed to load. Try again.";
                }
            }

            function setupTV(showData) {
                const tabsEl = document.getElementById('season-tabs');
                tabsEl.innerHTML = '';

                const validSeasons = showData.seasons.filter(s => s.season_number > 0 || showData.seasons.length === 1);

                validSeasons.forEach((season, idx) => {
                    const tab = document.createElement('button');
                    tab.className = 'season-tab tv-focusable' + (idx === 0 ? ' active' : '');
                    tab.innerText = season.name;
                    tab.onclick = () => {
                        document.querySelectorAll('.season-tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        fetchEpisodes(season.season_number);
                    };
                    tabsEl.appendChild(tab);
                });

                if (validSeasons.length > 0) fetchEpisodes(validSeasons[0].season_number);
            }

            async function fetchEpisodes(seasonNumber) {
                const container = document.getElementById('episodes-container');
                container.innerHTML = '<p style="color:#666;padding:20px">Loading episodes...</p>';

                try {
                    const res = await fetch(`https://api.themoviedb.org/3/tv/${movieId}/season/${seasonNumber}?api_key=${TMDB_API_KEY}`);
                    const data = await res.json();

                    if (!data.episodes || data.episodes.length === 0) {
                        container.innerHTML = '<p style="color:#666;padding:20px">No episodes found for this season.</p>';
                        return;
                    }

                    container.innerHTML = '';
                    data.episodes.forEach(ep => {
                        const item = document.createElement('div');
                        item.className = 'episode-item tv-focusable';

                        const rawThumb = ep.still_path
                            ? `https://image.tmdb.org/t/p/w300${ep.still_path}`
                            : '';

                        const thumbHtml = rawThumb
                            ? `<img class="episode-thumb-img" src="${rawThumb}" alt="ep ${ep.episode_number}" loading="lazy" onerror="this.style.display='none';this.parentElement.style.background='#222'">`
                            : '<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center"><i class="fa fa-film" style="color:#444"></i></div>';

                        const runtime = ep.runtime ? `${ep.runtime}m` : '';
                        const airDate = ep.air_date ? new Date(ep.air_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';

                        item.innerHTML = `
                            <div class="episode-number">${ep.episode_number}</div>
                            <div class="episode-thumb-wrap">
                                ${thumbHtml}
                                <div class="episode-thumb-overlay">
                                    <i class="fa fa-play ep-play-icon"></i>
                                </div>
                            </div>
                            <div class="episode-text">
                                <div class="episode-name">${ep.name}</div>
                                <div class="episode-overview">${ep.overview || 'No description available.'}</div>
                            </div>
                            <div class="episode-runtime">
                                ${runtime ? `<div style="margin-bottom:4px">${runtime}</div>` : ''}
                                <div style="color:#555; font-size:0.75rem">${airDate}</div>
                            </div>
                        `;

                        item.onclick = () => {
                            window.location.href = `watch.html?id=${movieId}&type=tv&s=${seasonNumber}&e=${ep.episode_number}`;
                        };
                        container.appendChild(item);
                    });
                } catch (e) {
                    console.error("Episode Error:", e);
                    container.innerHTML = '<p style="color:#666;padding:20px">Error loading episodes. Please try again.</p>';
                }
            }

            fetchDetails();

            document.getElementById('play-btn').addEventListener('click', () => {
                window.location.href = `watch.html?id=${movieId}&type=${type}`;
            });

            // ── Watchlist Logic ──
            const addListBtn = document.getElementById('add-list-btn');
            
            async function checkWatchlist() {
                if (!userSession) return;
                const { data } = await supabase.from('movies').select('id, watchlist(id)').eq('tmdb_id', movieId).single();
                if (data && data.watchlist && data.watchlist.length > 0) {
                    addListBtn.innerHTML = '<i class="fa fa-check"></i> Added';
                    addListBtn.classList.add('active');
                }
            }
            checkWatchlist();

            addListBtn.onclick = async () => {
                if (!userSession) { pirateAlert("Login Required", "Please login to manage your list!"); return; }
                
                addListBtn.disabled = true;
                try {
                    // 1. Sync movie to DB
                    const { data: mId, error: mError } = await supabase.rpc('upsert_movie', {
                        p_tmdb_id: movieId,
                        p_title: titleEl.innerText,
                        p_poster_path: posterEl.src.split('w500')[1] || '',
                        p_type: type
                    });

                    if (mError) throw mError;

                    // 2. Toggle Watchlist
                    const { data: existing } = await supabase.from('watchlist').select('id').eq('user_id', userSession.user_id).eq('movie_id', mId).single();
                    
                    if (existing) {
                        await supabase.from('watchlist').delete().eq('id', existing.id);
                        addListBtn.innerHTML = '<i class="fa fa-plus"></i> My List';
                        addListBtn.classList.remove('active');
                    } else {
                        await supabase.from('watchlist').insert({ user_id: userSession.user_id, movie_id: mId });
                        addListBtn.innerHTML = '<i class="fa fa-check"></i> Added';
                        addListBtn.classList.add('active');
                    }
                } catch (e) {
                    console.error("Watchlist Error:", e);
                }
                addListBtn.disabled = false;
            };
        });
    </script>
</body>
</html>
